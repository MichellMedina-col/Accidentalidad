<script>
    // Este script se ejecuta dentro de un iframe de Streamlit.
    // Para acceder a los elementos reales de la aplicación, debemos subir al DOM del padre (window.parent.document)
    
    function aplicarEstiloNeon(colorNeon, isDark) {
        const parentDoc = window.parent.document;
        
        // 1. Buscar todas las tarjetas (contenedores con borde de Streamlit)
        const tarjetas = parentDoc.querySelectorAll('div[data-testid="stVerticalBlockBorderWrapper"]');
        
        tarjetas.forEach(tarjeta => {
            // Aplicar estilo de línea inferior neón (fondo oscuro plano + línea gruesa abajo)
            tarjeta.style.backgroundColor = 'rgba(14, 17, 23, 0.85)';
            tarjeta.style.border = 'none';
            tarjeta.style.borderBottom = `4px solid ${colorNeon}`;
            tarjeta.style.borderRadius = '8px';
            tarjeta.style.boxShadow = `0px 8px 20px -6px ${colorNeon}80`;
            tarjeta.style.marginBottom = '15px';
            
            // Forzar el texto blanco DENTRO de cada tarjeta
            const textos = tarjeta.querySelectorAll('h1, h2, h3, p, label, div[data-baseweb="select"] div');
            textos.forEach(t => {
                t.style.color = '#FFFFFF';
            });
        });
    }

    // Escuchar mensajes desde Python/Streamlit o ejecutar con parámetros fijos pasados desde Python
    const colorActivo = "COLOR_PLACEHOLDER"; // Esto será reemplazado desde Python
    const isDarkTheme = "THEME_PLACEHOLDER" === "true";

    // Ejecutar la aplicación de estilos con un pequeño retraso para asegurar que Streamlit ya pintó los divs
    setTimeout(() => {
        if (colorActivo !== "COLOR_PLACEHOLDER") {
            aplicarEstiloNeon(colorActivo, isDarkTheme);
        }
    }, 500);

    // Observador para cambios en el DOM (en caso de que Streamlit recargue la vista)
    const observer = new MutationObserver(() => {
        if (colorActivo !== "COLOR_PLACEHOLDER") {
            aplicarEstiloNeon(colorActivo, isDarkTheme);
        }
    });

    observer.observe(window.parent.document.body, { childList: true, subtree: true });

</script>
